project: neural-sde
log_backend: csv
results_dir: results-poc-vit-s-cifar10
dataset: cifar10

# baseline: orthogonal residual (x + f_perp(x))
residual_connection: orthogonal
orthogonal_method: feature
residual_pattern: default

# model
model: vit
preset: S
drop_path: 0.0
mlp_dropout: 0.0

# optimization
optimizer: adam
global_batch_size: 1024
grad_accumulate_steps: 1
lr: 1.0e-3
weight_decay: 0.0001
epochs: 50
warmup_epoch: 5
lr_scheduler_type: cos
grad_clip:
save_every_epochs: 50
save_every_steps: 100000000

# regularisation & aug
use_mixup: true
mixup_alpha: 0.8
cutmix_alpha: 1.0
mixup_prob: 1.0
label_smoothing: 0.1
random_erase: 0.25
randaugment_N: 9
randaugment_M: 5

torch_compile: false
log_activations: true

