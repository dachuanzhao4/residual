project: neural-sde
dataset: cifar10

# model
model: vit
preset: S            # 384-dim, 6 layers, 6 heads
drop_path: 0.0
mlp_dropout: 0.0

# residual connect
residual_connection: ours
orthogonal_method: feature
residual_pattern: default

# radial SDE (chi / isotropic Gaussian radius)
sde_trainable: true
sde_alpha_init: 1.0e-3
sde_beta_scale_init: 0.0
sde_sigma2: 1.0
sde_noise_mode: train

# optimization
optimizer: adam
global_batch_size: 1024
grad_accumulate_steps: 1
lr: 1.0e-3
weight_decay: 0.0001
epochs: 300
warmup_epoch: 10
lr_scheduler_type: cos
grad_clip:

# regularisation & aug
use_mixup: true
mixup_alpha: 0.8
cutmix_alpha: 1.0
mixup_prob: 1.0
label_smoothing: 0.1
random_erase: 0.25
randaugment_N: 9
randaugment_M: 5

torch_compile: true
log_activations: true
